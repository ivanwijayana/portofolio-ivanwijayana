<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Ivan Wijayana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Inter:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        overflow-x: hidden;
      }
      .hero-title {
        font-family: "Inter", sans-serif;
        line-height: 0.85;
        letter-spacing: -0.05em;
      }
      .text-outline {
        color: transparent;
        -webkit-text-stroke: 1px #0a192f;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(-10deg);
        }
        50% {
          transform: translateY(-6px) rotate(-8deg);
        }
      }
      @keyframes float-delayed {
        0%,
        100% {
          transform: translateY(0) rotate(10deg);
        }
        50% {
          transform: translateY(-4px) rotate(12deg);
        }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      .animate-float-delayed {
        animation: float-delayed 5s ease-in-out infinite;
      }
    </style>
  </head>
  <body
    class="selection:bg-blue-600 selection:text-white bg-white text-slate-900"
  >
    <header
      class="fixed w-full top-0 z-[100] bg-white/80 backdrop-blur-md border-b border-slate-100"
    >
      <nav
        class="container mx-auto px-6 py-5 flex justify-between items-center"
      >
        <a href="/" class="text-2xl font-black tracking-tighter uppercase">
          IVAN<span class="text-blue-600">.W</span>
        </a>
        <div
          class="hidden md:flex gap-10 text-[10px] font-black uppercase tracking-[0.2em]"
        >
          <a href="/" class="hover:text-blue-600 transition-all">Home</a>
          <a
            href="#"
            class="text-blue-600 relative after:absolute after:-bottom-1 after:left-0 after:w-full after:h-0.5 after:bg-blue-600"
            >Projects</a
          >
          <a href="#" class="hover:text-blue-600 transition-all">Career</a>
          <a href="#" class="hover:text-blue-600 transition-all">About</a>
        </div>
      </nav>
    </header>

    <main class="pt-24 lg:pt-32 pb-16">
      <div class="container mx-auto px-6">
        <div
          class="flex flex-col lg:grid lg:grid-cols-2 gap-2 lg:gap-16 items-center"
        >
          <section
            class="order-first lg:order-last w-full flex justify-center items-center relative py-4 lg:py-0"
          >
            <div
              class="absolute w-24 h-24 lg:w-72 lg:h-72 bg-blue-500/10 rounded-full blur-[40px] lg:blur-[100px] pointer-events-none"
            ></div>

            <div
              class="relative w-full max-w-[160px] sm:max-w-[300px] lg:max-w-[400px] aspect-square flex items-center justify-center transition-all duration-500"
            >
              <div
                class="absolute z-30 top-0 -left-[10%] bg-slate-900 p-2 lg:p-4 rounded-lg shadow-xl border border-slate-700 w-24 lg:w-52 animate-float"
              >
                <div class="flex gap-1 mb-1 lg:mb-3">
                  <div class="w-1 h-1 rounded-full bg-red-500"></div>
                  <div class="w-1 h-1 rounded-full bg-yellow-500"></div>
                  <div class="w-1 h-1 rounded-full bg-green-500"></div>
                </div>
                <div class="space-y-1 lg:space-y-2">
                  <div class="h-0.5 lg:h-1 w-full bg-blue-500/30 rounded"></div>
                  <div class="h-0.5 lg:h-1 w-[70%] bg-slate-700 rounded"></div>
                </div>
              </div>

              <div
                class="relative z-20 bg-white p-4 lg:p-10 rounded-2xl lg:rounded-[2.5rem] shadow-lg border border-slate-100 group transition-all"
              >
                <div
                  class="absolute inset-0 bg-blue-50 rounded-2xl lg:rounded-[2.5rem] scale-95 opacity-0 group-hover:opacity-100 transition-all"
                ></div>
                <i
                  data-lucide="binary"
                  class="relative w-7 h-7 lg:w-20 lg:h-20 text-blue-600"
                ></i>
                <div
                  class="mt-2 lg:mt-5 w-full bg-slate-100 h-0.5 lg:h-1.5 rounded-full overflow-hidden"
                >
                  <div
                    class="bg-blue-600 h-full w-2/3 animate-[shimmer_2s_infinite] origin-left"
                  ></div>
                </div>
              </div>

              <div
                class="absolute z-30 bottom-[8%] -right-[10%] bg-white p-2 lg:p-5 rounded-lg lg:rounded-2xl shadow-lg border border-blue-50 w-24 lg:w-48 animate-float-delayed"
              >
                <div class="flex items-center gap-1 mb-1 lg:mb-2">
                  <div class="p-0.5 lg:p-1 bg-blue-50 rounded text-blue-600">
                    <i
                      data-lucide="terminal"
                      class="w-2.5 h-2.5 lg:w-4 lg:h-4"
                    ></i>
                  </div>
                  <span
                    class="text-[5px] lg:text-[9px] font-black uppercase text-slate-400 tracking-wider"
                    >Status</span
                  >
                </div>
                <div class="flex items-center gap-1">
                  <span class="relative flex h-1 w-1 lg:h-2 lg:w-2">
                    <span
                      class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
                    ></span>
                    <span
                      class="relative inline-flex rounded-full h-1 w-1 lg:h-2 lg:w-2 bg-green-500"
                    ></span>
                  </span>
                  <span
                    class="text-[7px] lg:text-xs font-bold text-slate-600 italic"
                    >Active</span
                  >
                </div>
              </div>

              <div
                class="absolute inset-0 border border-slate-200/30 rounded-full"
              ></div>
              <div
                class="absolute inset-[10%] border border-dashed border-blue-200/20 rounded-full animate-[spin_40s_linear_infinite]"
              ></div>
            </div>
          </section>

          <section class="text-center lg:text-left">
            <h1
              class="hero-title flex flex-col uppercase font-black text-[#0A192F] mb-4 lg:mb-6"
            >
              <span class="text-[11vw] lg:text-[7vw]">Selected</span>
              <span class="text-blue-600 text-[11vw] lg:text-[7vw]"
                >Projects</span
              >
              <span
                class="text-outline italic opacity-30 text-[7vw] lg:text-[5vw] mt-1"
                >Experience</span
              >
            </h1>

            <div
              class="max-w-md mx-auto lg:mx-0 border-l-4 border-blue-600 pl-4 lg:pl-5 text-left"
            >
              <p
                class="text-slate-500 font-medium text-xs sm:text-base lg:text-lg leading-relaxed"
              >
                Eksplorasi pengembangan perangkat lunak yang mempertemukan
                arsitektur kode yang solid dengan implementasi AI cerdas,
                dirancang untuk efisiensi tinggi tanpa mengabaikan aspek visual.
              </p>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="py-12 bg-[#0A192F] text-white">
      <div
        class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6"
      >
        <h2 class="text-xl font-black uppercase tracking-tighter">
          BUILD<span class="text-blue-500">BOLD</span>
        </h2>
        <div
          class="flex gap-8 text-[10px] font-black uppercase tracking-[0.2em]"
        >
          <a href="#" class="hover:text-blue-400 transition-colors"
            >Instagram</a
          >
          <a href="#" class="hover:text-blue-400 transition-colors">LinkedIn</a>
        </div>
      </div>
    </footer>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
